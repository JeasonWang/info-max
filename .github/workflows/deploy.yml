name: Deploy Info Max

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        run: docker build --build-arg VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }} -t info-max:latest .

      - name: Export Frontend Image
        run: docker save info-max:latest | gzip > info-max-image.tar.gz

      - name: Copy Deploy Files To Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,info-max-image.tar.gz"
          target: ${{ secrets.SERVER_DEPLOY_PATH }}

      - name: Deploy On Server
        uses: appleboy/ssh-action@v1.2.0
        env:
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: SERVER_DEPLOY_PATH
          script: |
            set -e
            mkdir -p "$SERVER_DEPLOY_PATH"
            cd "$SERVER_DEPLOY_PATH"
            gunzip -c info-max-image.tar.gz | docker load
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
